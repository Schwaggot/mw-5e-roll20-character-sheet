<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MW 5E Sheet — Local Preview</title>
    <link rel="stylesheet" href="/__sheet-css" />
    <style>
      /* Dev-only chrome — not part of the Roll20 sheet. */
      html, body {
        margin: 0;
        background: #1a1a1a;
        font-family: system-ui, sans-serif;
        color: #ddd;
      }
      .preview-chrome {
        padding: 16px;
        max-width: 1100px;
        margin: 0 auto;
      }
      .preview-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        margin-bottom: 16px;
        border: 1px dashed #555;
        border-radius: 4px;
        font-size: 13px;
      }
      .preview-bar code {
        background: #000;
        padding: 2px 6px;
        border-radius: 3px;
      }
      .charsheet {
        background: #fff;
        color: #000;
      }
      /* Repeating-section controls injected by the preview bootstrap. */
      .repcontrol_add {
        margin: 4px 0 12px;
        padding: 4px 10px;
        font-size: 12px;
        background: #2b5c2b;
        color: #fff;
        border: 1px solid #1a3c1a;
        border-radius: 3px;
        cursor: pointer;
      }
      .repcontrol_add:hover { background: #377037; }
      .repitem {
        position: relative;
      }
      .repcontrol_del {
        position: absolute;
        top: 2px;
        right: 2px;
        width: 22px;
        height: 22px;
        padding: 0;
        font-size: 14px;
        line-height: 20px;
        background: #5c2b2b;
        color: #fff;
        border: 1px solid #3c1a1a;
        border-radius: 3px;
        cursor: pointer;
        z-index: 10;
      }
      .repcontrol_del:hover { background: #703737; }
      #roll20-chat {
        margin-top: 16px;
        padding: 8px 12px;
        max-height: 180px;
        overflow-y: auto;
        background: #111;
        color: #8f8;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 12px;
        border: 1px solid #333;
        border-radius: 4px;
      }
      #roll20-chat:empty::before {
        content: "(chat log — startRoll output appears here)";
        color: #666;
      }
      .chat-entry { padding: 2px 0; }
    </style>
  </head>
  <body>
    <div class="preview-chrome">
      <div class="preview-bar">
        <span>Local preview — Roll20 <code>.charsheet</code> wrapper, stubbed sheet worker</span>
        <span>Edit <code>src/sheet.html</code> / <code>src/sheet.css</code></span>
      </div>
      <div class="charsheet">
        <div id="sheet-root"></div>
      </div>
      <div id="roll20-chat"></div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
