  <!-- ===================== TAB: NOTES ===================== -->
  <section class="atlas-tab-pane" data-tab="notes">

    <div class="atlas-section">
      <h2>Background</h2>
      <textarea name="attr_background" rows="6" placeholder="Herkunft, Dienstgeschichte, Motivation..."></textarea>
    </div>

    <div class="atlas-section">
      <h2>Aussehen</h2>
      <textarea name="attr_appearance" rows="6" placeholder="Körperbau, Gesichtszüge, Haare, Augen, Haltung, markante Narben / Tattoos, typische Kleidung außer Uniform..."></textarea>
    </div>

    <div class="atlas-section">
      <h2>Mission Notes</h2>
      <textarea name="attr_mission_notes" rows="10" placeholder="Briefing-Notizen, Intel, Aufgaben..."></textarea>
    </div>

    <div class="atlas-section">
      <h2>Gear Loadout / Packliste</h2>
      <textarea name="attr_loadout" rows="6" placeholder="Standard Issue + personalisierte Ausrüstung..."></textarea>
    </div>

  </section>
